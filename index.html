<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy 17th Birthday Bristi</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #ffe6f0, #fff);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 2.5em;
      color: #d63384;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2em;
      color: #444;
      margin: 10px 0;
    }

    .cake {
      width: 80px;
      height: 80px;
      background: pink;
      border-radius: 10px;
      margin: 20px auto;
      position: relative;
      animation: float 4s ease-in-out infinite;
    }

    .candle {
      width: 10px;
      height: 40px;
      background: #fff;
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
    }

    .flame {
      width: 15px;
      height: 15px;
      background: orange;
      border-radius: 50%;
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      animation: flicker 0.3s infinite alternate;
    }

    @keyframes flicker {
      from { transform: translateX(-50%) scale(1); opacity: 0.8; }
      to { transform: translateX(-50%) scale(1.2); opacity: 1; }
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0); }
    }

    .next-btn {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #d63384;
      color: #fff;
      font-size: 1em;
      cursor: pointer;
      transition: background 0.3s;
    }

    .next-btn:hover {
      background: #a61d63;
    }
  </style>
</head>
<body>

  <!-- Added Audio -->
  <audio autoplay loop>
    <source src="bday.mp3" type="audio/mpeg">
  </audio>

  <div class="glass-card">
    <h1>Happy 17th Birthday, Bristi!</h1>
    <p>Seventeen candles, seventeen dreams, all shining bright for you.</p>
    <p>May your laughter be louder, your heart lighter, and your days brighter.</p>
    <div class="cake">
      <div class="candle"></div>
      <div class="flame"></div>
    </div>
    <button class="next-btn" onclick="window.location.href='page2.html'">It won’t bite. Tap</button>
  </div>
</body>
</html>
