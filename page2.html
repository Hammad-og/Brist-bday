<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bristi’s Birthday Wishes</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #ffe6f0, #fff);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    video {
      width: 400px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      margin-bottom: 30px;
    }

    .wishes {
      font-size: 1.5em;
      color: #d63384;
      text-align: center;
      opacity: 0;
      animation: fadeIn 3s ease-in-out forwards;
    }

    .wishes:nth-child(2) { animation-delay: 3s; }
    .wishes:nth-child(3) { animation-delay: 6s; }
    .wishes:nth-child(4) { animation-delay: 9s; }
    .wishes:nth-child(5) { animation-delay: 12s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .back-btn {
      margin-top: 40px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #d63384;
      color: #fff;
      font-size: 1em;
      cursor: pointer;
      transition: background 0.3s;
    }

    .back-btn:hover {
      background: #a61d63;
    }
  </style>
</head>
<body>
  <!-- Replace candle.mp4 with your actual video filename -->
  <video autoplay loop muted>
    <source src="candle.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <div class="wishes">Happy 17th, Bristi! 🌸</div>
  <div class="wishes">May your spirit glow warmly, like these candles.</div>
  <div class="wishes">Seventeen is a beautiful age full of dreams.</div>
  <div class="wishes">You are a blessing to everyone around you.</div>
  <div class="wishes">May your journey ahead be sweet and bright.</div>

  <button class="back-btn" onclick="window.location.href='index.html'">Back to First Page</button>
</body>
</html>
